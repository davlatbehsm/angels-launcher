name: Build Angels Launcher
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow requests

    - name: Get version from script
      id: get_version
      shell: python
      run: |
        import re, os
        with open('angels_launcher.py', 'r', encoding='utf-8') as f:
            content = f.read()
        match = re.search(r'LAUNCHER_VER\s*=\s*"([^"]+)"', content)
        version = match.group(1) if match else "0.0"
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"version={version}\n")
        print(f"Version detected: {version}")

    - name: Build EXE
      shell: pwsh
      run: |
        pyinstaller `
          --onefile `
          --noconsole `
          --noupx `
          --name "AngelsLauncher" `
          --hidden-import "tkinter" `
          --hidden-import "tkinter.ttk" `
          --hidden-import "tkinter.messagebox" `
          --hidden-import "tkinter.filedialog" `
          --hidden-import "tkinter.font" `
          --hidden-import "tkinter.colorchooser" `
          --hidden-import "tkinter.simpledialog" `
          --hidden-import "tkinter.scrolledtext" `
          --hidden-import "PIL" `
          --hidden-import "PIL.Image" `
          --hidden-import "PIL.ImageTk" `
          --hidden-import "urllib.request" `
          --hidden-import "urllib.parse" `
          --hidden-import "json" `
          --hidden-import "threading" `
          --hidden-import "subprocess" `
          --hidden-import "webbrowser" `
          --collect-all "tkinter" `
          --collect-submodules "tkinter" `
          angels_launcher.py

    - name: Verify EXE exists and size
      shell: pwsh
      run: |
        if (!(Test-Path "dist/AngelsLauncher.exe")) {
          Write-Error "EXE not found after build!"
          exit 1
        }
        $size = (Get-Item "dist/AngelsLauncher.exe").Length
        $sizeMB = [math]::Round($size / 1MB, 2)
        Write-Host "SUCCESS: AngelsLauncher.exe = $sizeMB MB"
        if ($size -lt 1MB) {
          Write-Error "EXE is suspiciously small ($sizeMB MB) - build likely failed"
          exit 1
        }

    - name: Test EXE launches (headless check)
      shell: pwsh
      run: |
        # Просто проверяем что exe не падает сразу при старте
        $proc = Start-Process -FilePath "dist/AngelsLauncher.exe" -PassThru -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 3
        if ($proc -and !$proc.HasExited) {
          Write-Host "EXE запустился успешно (PID: $($proc.Id))"
          $proc.Kill()
        } else {
          Write-Warning "EXE завершился быстро — возможна ошибка запуска"
        }

    - name: Delete old release if exists
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete "v${{ steps.get_version.outputs.version }}" --yes 2>/dev/null || true
        git push --delete origin "v${{ steps.get_version.outputs.version }}" 2>/dev/null || true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Angels Launcher v${{ steps.get_version.outputs.version }}
        body: |
          ## Angels Launcher v${{ steps.get_version.outputs.version }}

          Автоматическая сборка через GitHub Actions.

          ### Установка
          1. Скачай `AngelsLauncher.exe`
          2. Запусти — больше ничего не нужно

          ### Обновление
          Нажми кнопку **"Обновить"** в лаунчере — он обновится сам.
        files: dist/AngelsLauncher.exe
        draft: false
        prerelease: false
        make_latest: true
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
